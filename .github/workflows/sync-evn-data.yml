name: Sync EVN data

on:
  push:
    branches: [master]
    paths:
      - .github/workflows/sync-evn-data.yml
  schedule:
    # 00:00 giờ Việt Nam (UTC+7) mỗi ngày
    - cron: "0 17 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-evn-data
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ensure tracked locations config exists
        run: |
          if [ ! -f config/locations.json ]; then
            cp config/locations.json.example config/locations.json
            echo "Using config/locations.json.example for schedule export."
          fi

      - name: Export locations catalog
        run: uv run evn-power-sync export-locations --output docs/data/locations.json

      - name: Export EVNSPC area index
        run: uv run evn-power-sync export-area-index --locations docs/data/locations.json --output docs/data/area_index.json

      - name: Export outage schedule
        run: uv run evn-power-sync export --config config/locations.json --output docs/data/schedule.json

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/locations.json docs/data/area_index.json docs/data/schedule.json
          if git diff --staged --quiet; then
            echo "No data changes."
            exit 0
          fi
          git commit -m "chore: sync EVN locations and outage data"
          git push
